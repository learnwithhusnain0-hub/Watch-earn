<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    
    <link rel="icon" type="image/png" href="https://i.ibb.co/hJD9bGbV/IMG-20260615-WA0025-1.png">
    <link rel="apple-touch-icon" href="https://i.ibb.co/hJD9bGbV/IMG-20260615-WA0025-1.png">
    
    <title>Learn with Shan · Admin Panel</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #0b0b0b;
            color: #f0f0f0;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            padding-bottom: 20px;
        }
        
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 16px;
        }
        
        /* ---------- HEADER ---------- */
        .site-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 215, 0, 0.18);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            object-fit: cover;
        }
        
        .logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            color: #FFD700;
            letter-spacing: 2px;
        }
        
        .admin-badge {
            background: rgba(255, 215, 0, 0.15);
            color: #FFD700;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: 700;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }
        
        .signin-btn {
            background: transparent;
            border: 1px solid rgba(255, 215, 0, 0.2);
            color: #FFD700;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            font-family: 'Montserrat', sans-serif;
        }
        
        .signin-btn:hover {
            background: rgba(255, 215, 0, 0.1);
        }
        
        /* ---------- MAIN ---------- */
        .main-content {
            padding: 20px 0;
        }
        
        .admin-hero {
            text-align: center;
            padding: 10px 0 20px;
        }
        
        .admin-hero h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2rem, 6vw, 3rem);
            color: #FFD700;
            letter-spacing: 2px;
        }
        
        .admin-hero p {
            color: #888;
            font-size: 0.9rem;
        }
        
        /* ---------- STATS ---------- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: rgba(20, 20, 18, 0.7);
            border: 1px solid rgba(255, 215, 0, 0.08);
            border-radius: 14px;
            padding: 14px;
            text-align: center;
        }
        
        .stat-card .stat-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: #FFD700;
        }
        
        .stat-card .stat-label {
            font-size: 0.6rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* ---------- SEARCH ---------- */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 0.9rem;
            font-family: 'Montserrat', sans-serif;
            outline: none;
        }
        
        .search-box input:focus {
            border-color: #FFD700;
        }
        
        .search-box button {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #FFD700, #e6b800);
            color: #0a0a0a;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
        }
        
        /* ---------- USER LIST ---------- */
        .user-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.05);
            transition: 0.3s;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .user-item:hover {
            border-color: rgba(255, 215, 0, 0.15);
            background: rgba(255, 215, 0, 0.02);
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .user-name {
            font-weight: 600;
            color: #fff;
        }
        
        .user-email {
            color: #888;
            font-size: 0.8rem;
        }
        
        .user-balance {
            color: #FFD700;
            font-weight: 700;
            font-size: 1.1rem;
        }
        
        .user-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .user-actions button {
            padding: 6px 14px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .user-actions button:hover {
            transform: scale(1.04);
        }
        
        .btn-manage {
            background: rgba(255, 215, 0, 0.15);
            color: #FFD700;
        }
        
        .btn-manage:hover {
            background: rgba(255, 215, 0, 0.25);
        }
        
        .btn-add {
            background: rgba(76, 175, 80, 0.15);
            color: #4CAF50;
        }
        
        .btn-add:hover {
            background: rgba(76, 175, 80, 0.25);
        }
        
        .btn-remove {
            background: rgba(255, 68, 68, 0.12);
            color: #ff4444;
        }
        
        .btn-remove:hover {
            background: rgba(255, 68, 68, 0.2);
        }
        
        .btn-view {
            background: rgba(66, 133, 244, 0.12);
            color: #4285F4;
        }
        
        .btn-view:hover {
            background: rgba(66, 133, 244, 0.2);
        }
        
        /* ---------- POPUP ---------- */
        .diamond-popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(16px);
            z-index: 99999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        
        .diamond-popup.active {
            display: flex;
        }
        
        .popup-content {
            max-width: 420px;
            width: 100%;
            background: rgba(20, 20, 18, 0.95);
            border-radius: 24px;
            padding: 32px 24px;
            border: 2px solid #FFD700;
            text-align: center;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .popup-content h2 {
            font-family: 'Bebas Neue', sans-serif;
            color: #FFD700;
            font-size: 1.8rem;
        }
        
        .popup-content .user-detail {
            color: #aaa;
            font-size: 0.85rem;
            margin: 4px 0 16px;
        }
        
        .popup-content .balance-display {
            font-size: 1.4rem;
            color: #FFD700;
            font-weight: 700;
            padding: 10px;
            background: rgba(255, 215, 0, 0.04);
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.06);
            margin-bottom: 16px;
        }
        
        .popup-content .breakdown {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
            font-size: 0.75rem;
        }
        
        .popup-content .breakdown .item {
            background: rgba(255, 255, 255, 0.02);
            padding: 8px;
            border-radius: 8px;
        }
        
        .popup-content .breakdown .item .label {
            color: #666;
        }
        
        .popup-content .breakdown .item .value {
            color: #FFD700;
            font-weight: 700;
        }
        
        .popup-content input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            outline: none;
            margin-bottom: 16px;
        }
        
        .popup-content input:focus {
            border-color: #FFD700;
        }
        
        .popup-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .popup-actions button {
            padding: 12px;
            border-radius: 30px;
            border: none;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        
        .popup-actions button:hover {
            transform: scale(1.04);
        }
        
        .popup-actions .btn-add {
            background: linear-gradient(135deg, #4CAF50, #388E3C);
            color: #fff;
            grid-column: 1;
        }
        
        .popup-actions .btn-remove {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: #fff;
            grid-column: 2;
        }
        
        .popup-actions .btn-set {
            background: linear-gradient(135deg, #FFD700, #e6b800);
            color: #0a0a0a;
            grid-column: 1 / -1;
        }
        
        .popup-actions .btn-close {
            background: rgba(255, 255, 255, 0.05);
            color: #888;
            grid-column: 1 / -1;
        }
        
        /* ---------- EMPTY STATE ---------- */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #555;
        }
        
        .empty-state i {
            font-size: 3rem;
            display: block;
            margin-bottom: 12px;
            color: #333;
        }
        
        /* ---------- LOADING ---------- */
        .loading {
            text-align: center;
            padding: 30px;
            color: #555;
        }
        
        .loading i {
            font-size: 1.5rem;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* ---------- RESPONSIVE ---------- */
        @media (max-width: 600px) {
            .user-item {
                flex-direction: column;
                align-items: stretch;
            }
            .user-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }
            .user-actions {
                justify-content: flex-start;
            }
            .popup-actions {
                grid-template-columns: 1fr;
            }
            .popup-actions .btn-add,
            .popup-actions .btn-remove {
                grid-column: 1;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .popup-content .breakdown {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="site-header">
        <div class="logo-area">
            <img class="logo-icon" src="https://i.ibb.co/ds4SFQsf/IMG-20260615-WA0025-1.webp" alt="Logo" />
            <span class="logo-text">LEARN WITH SHAN</span>
            <span class="admin-badge"><i class="fas fa-user-shield"></i> ADMIN</span>
        </div>
        <div>
            <button class="signin-btn" id="headerSignInBtn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="main-content container">

        <!-- HERO -->
        <div class="admin-hero">
            <h1>🛡️ Admin Panel</h1>
            <p>Manage users, diamonds, and platform earnings</p>
        </div>

        <!-- STATS -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-value" id="totalUsers">0</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalDiamonds">0 💎</div>
                <div class="stat-label">Total Diamonds</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalWithdrawals">0</div>
                <div class="stat-label">Total Withdrawals</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="pendingWithdrawals">0</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>

        <!-- SEARCH -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Search by email or name..." />
            <button onclick="searchUsers()"><i class="fas fa-search"></i> Search</button>
            <button onclick="loadAllUsers()" style="background:rgba(255,215,0,0.1); color:#FFD700;"><i class="fas fa-sync"></i></button>
        </div>

        <!-- USER LIST -->
        <div id="usersContainer">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading users...</div>
        </div>

    </div>

    <!-- DIAMOND MANAGEMENT POPUP -->
    <div class="diamond-popup" id="diamondPopup">
        <div class="popup-content">
            <h2>💎 Manage Diamonds</h2>
            <div class="user-detail" id="popupUserInfo">User: loading...</div>
            <div class="balance-display">
                Current Balance: <span id="popupCurrentBalance">0</span> 💎
            </div>
            <div class="breakdown">
                <div class="item">
                    <div class="label">Main Balance</div>
                    <div class="value" id="popupMainBalance">0</div>
                </div>
                <div class="item">
                    <div class="label">Referral Bonus</div>
                    <div class="value" id="popupReferralBonus">0</div>
                </div>
                <div class="item">
                    <div class="label">Team Earning</div>
                    <div class="value" id="popupTeamEarning">0</div>
                </div>
            </div>
            <input type="number" id="diamondAmount" placeholder="Enter amount..." min="1" />
            <div class="popup-actions">
                <button class="btn-add" onclick="confirmAddDiamonds()"><i class="fas fa-plus"></i> Add</button>
                <button class="btn-remove" onclick="confirmRemoveDiamonds()"><i class="fas fa-minus"></i> Remove</button>
                <button class="btn-set" onclick="confirmSetBalance()"><i class="fas fa-edit"></i> Set Custom</button>
                <button class="btn-close" onclick="closeDiamondPopup()"><i class="fas fa-times"></i> Close</button>
            </div>
        </div>
    </div>

    <!-- CONFIRM POPUP -->
    <div class="diamond-popup" id="confirmPopup">
        <div class="popup-content" style="border-color:#ff4444;">
            <h2 style="color:#ff4444;">⚠️ Confirm</h2>
            <p id="confirmMessage" style="color:#aaa; margin:12px 0;">Are you sure?</p>
            <div class="popup-actions">
                <button class="btn-remove" onclick="confirmAction()" style="grid-column:1/2;">Yes, Confirm</button>
                <button class="btn-close" onclick="closeConfirmPopup()" style="grid-column:2/3;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDr8cOagJ0dXLiil62JvH4q02mIcmxX9pc",
            authDomain: "learnwithshan-4be25.firebaseapp.com",
            projectId: "learnwithshan-4be25",
            storageBucket: "learnwithshan-4be25.firebasestorage.app",
            messagingSenderId: "632640212736",
            appId: "1:632640212736:web:554cba768fb7c0d1e46de5",
            measurementId: "G-SV6PX5N75Q"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ============================================================
        // STATE
        // ============================================================
        let selectedUserId = null;
        let selectedUserData = null;
        let allUsers = [];
        let pendingAction = null;
        let pendingAmount = 0;

        // ============================================================
        // AUTH STATE
        // ============================================================
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                headerSignInBtn.innerHTML =
                    `<i class="fas fa-user"></i> ${user.displayName || user.email.split('@')[0]}`;
                
                // Check if admin
                const isAdmin = await checkAdmin(user.email);
                if (isAdmin) {
                    loadAllUsers();
                } else {
                    document.getElementById('usersContainer').innerHTML = `
                            <div class="empty-state">
                                <i class="fas fa-lock" style="color:#ff4444;"></i>
                                <p style="color:#ff4444;">Access Denied</p>
                                <p style="color:#555;">You don't have admin privileges.</p>
                            </div>
                        `;
                    document.querySelector('.stats-grid').style.display = 'none';
                }
            } else {
                headerSignInBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                document.getElementById('usersContainer').innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-sign-in-alt" style="color:#FFD700;"></i>
                            <p style="color:#FFD700;">Please sign in to access admin panel</p>
                            <button onclick="showLoginPopup()" style="margin-top:12px; background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.2); color:#FFD700; padding:10px 24px; border-radius:12px; cursor:pointer; font-family:'Montserrat',sans-serif; font-weight:600;">
                                <i class="fas fa-sign-in-alt"></i> Sign In
                            </button>
                        </div>
                    `;
                document.querySelector('.stats-grid').style.display = 'none';
            }
        });

        // ============================================================
        // CHECK ADMIN
        // ============================================================
        async function checkAdmin(email) {
            try {
                const doc = await db.collection('settings').doc('admin').get();
                if (doc.exists) {
                    const data = doc.data();
                    const emails = data.emails || [data.email || ''];
                    return emails.includes(email);
                }
                return false;
            } catch (error) {
                console.error('Admin check error:', error);
                return false;
            }
        }

        // ============================================================
        // SHOW LOGIN POPUP
        // ============================================================
        function showLoginPopup() {
            // Simple login redirect to index.html
            window.location.href = 'watch-earn.html';
        }

        // ============================================================
        // LOAD ALL USERS
        // ============================================================
        async function loadAllUsers() {
            const container = document.getElementById('usersContainer');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Loading users...</div>';

            try {
                const snapshot = await db.collection('users')
                    .orderBy('totalDiamonds', 'desc')
                    .get();

                allUsers = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const total = (data.totalDiamonds || 0) + (data.referralBonus || 0) + (data.teamEarning || 0);
                    allUsers.push({
                        id: doc.id,
                        ...data,
                        total: total
                    });
                });

                renderUsers(allUsers);
                updateStats(allUsers);

            } catch (error) {
                console.error('Load users error:', error);
                container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-exclamation-circle" style="color:#ff4444;"></i>
                            <p style="color:#ff4444;">Error loading users: ${error.message}</p>
                        </div>
                    `;
            }
        }

        // ============================================================
        // RENDER USERS
        // ============================================================
        function renderUsers(users) {
            const container = document.getElementById('usersContainer');

            if (users.length === 0) {
                container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-users"></i>
                            <p>No users found.</p>
                        </div>
                    `;
                return;
            }

            let html = '<div class="user-list">';
            users.forEach((user, index) => {
                const name = user.displayName || 'User';
                const email = user.email || 'No email';
                const total = user.total || 0;

                html += `
                        <div class="user-item">
                            <div class="user-info">
                                <span class="user-name">${index + 1}. ${name}</span>
                                <span class="user-email">${email}</span>
                                <span class="user-balance">${total.toLocaleString()} 💎</span>
                            </div>
                            <div class="user-actions">
                                <button class="btn-manage" onclick="openDiamondPopup('${user.id}')">
                                    <i class="fas fa-gem"></i> Manage
                                </button>
                            </div>
                        </div>
                    `;
            });
            html += '</div>';

            container.innerHTML = html;
        }

        // ============================================================
        // UPDATE STATS
        // ============================================================
        function updateStats(users) {
            let totalUsers = users.length;
            let totalDiamonds = 0;
            let totalWithdrawals = 0;
            let pendingWithdrawals = 0;

            users.forEach(user => {
                totalDiamonds += user.total || 0;
                if (user.withdrawals) {
                    totalWithdrawals += user.withdrawals.length;
                    user.withdrawals.forEach(w => {
                        if (w.status === 'pending') pendingWithdrawals++;
                    });
                }
            });

            document.getElementById('totalUsers').textContent = totalUsers;
            document.getElementById('totalDiamonds').textContent = totalDiamonds.toLocaleString() + ' 💎';
            document.getElementById('totalWithdrawals').textContent = totalWithdrawals;
            document.getElementById('pendingWithdrawals').textContent = pendingWithdrawals;
        }

        // ============================================================
        // SEARCH USERS
        // ============================================================
        function searchUsers() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) {
                renderUsers(allUsers);
                return;
            }

            const filtered = allUsers.filter(user => {
                const name = (user.displayName || '').toLowerCase();
                const email = (user.email || '').toLowerCase();
                return name.includes(query) || email.includes(query);
            });

            renderUsers(filtered);
        }

        // ============================================================
        // OPEN DIAMOND POPUP
        // ============================================================
        async function openDiamondPopup(userId) {
            selectedUserId = userId;
            
            try {
                const doc = await db.collection('users').doc(userId).get();
                if (!doc.exists) {
                    showToast('User not found', 'error');
                    return;
                }

                selectedUserData = doc.data();
                const total = (selectedUserData.totalDiamonds || 0) + 
                            (selectedUserData.referralBonus || 0) + 
                            (selectedUserData.teamEarning || 0);

                document.getElementById('popupUserInfo').textContent = 
                    `👤 ${selectedUserData.displayName || 'User'} (${selectedUserData.email || 'No email'})`;
                document.getElementById('popupCurrentBalance').textContent = total.toLocaleString();
                document.getElementById('popupMainBalance').textContent = (selectedUserData.totalDiamonds || 0).toLocaleString();
                document.getElementById('popupReferralBonus').textContent = (selectedUserData.referralBonus || 0).toLocaleString();
                document.getElementById('popupTeamEarning').textContent = (selectedUserData.teamEarning || 0).toLocaleString();
                document.getElementById('diamondAmount').value = '';
                document.getElementById('diamondPopup').classList.add('active');

            } catch (error) {
                console.error('Error:', error);
                showToast('Failed to load user data', 'error');
            }
        }

        // ============================================================
        // CLOSE DIAMOND POPUP
        // ============================================================
        function closeDiamondPopup() {
            document.getElementById('diamondPopup').classList.remove('active');
            selectedUserId = null;
            selectedUserData = null;
        }

        // ============================================================
        // CONFIRM ADD DIAMONDS
        // ============================================================
        function confirmAddDiamonds() {
            const amount = parseInt(document.getElementById('diamondAmount').value);
            if (!amount || amount <= 0) {
                showToast('Please enter a valid amount', 'warning');
                return;
            }

            pendingAmount = amount;
            pendingAction = 'add';
            showConfirmPopup(
                `Add ${amount.toLocaleString()} diamonds?`,
                `This will add ${amount.toLocaleString()} diamonds to ${selectedUserData.displayName || 'User'}'s account.`
            );
        }

        // ============================================================
        // CONFIRM REMOVE DIAMONDS
        // ============================================================
        function confirmRemoveDiamonds() {
            const amount = parseInt(document.getElementById('diamondAmount').value);
            if (!amount || amount <= 0) {
                showToast('Please enter a valid amount', 'warning');
                return;
            }

            const total = (selectedUserData.totalDiamonds || 0) + 
                        (selectedUserData.referralBonus || 0) + 
                        (selectedUserData.teamEarning || 0);

            if (amount > total) {
                showToast(`Cannot remove ${amount.toLocaleString()}. User only has ${total.toLocaleString()} diamonds.`, 'warning');
                return;
            }

            pendingAmount = amount;
            pendingAction = 'remove';
            showConfirmPopup(
                `Remove ${amount.toLocaleString()} diamonds?`,
                `This will remove ${amount.toLocaleString()} diamonds from ${selectedUserData.displayName || 'User'}'s account.`
            );
        }

        // ============================================================
        // CONFIRM SET BALANCE
        // ============================================================
        function confirmSetBalance() {
            const amount = parseInt(document.getElementById('diamondAmount').value);
            if (!amount || amount < 0) {
                showToast('Please enter a valid amount', 'warning');
                return;
            }

            pendingAmount = amount;
            pendingAction = 'set';
            showConfirmPopup(
                `Set balance to ${amount.toLocaleString()} diamonds?`,
                `This will set ${selectedUserData.displayName || 'User'}'s balance to ${amount.toLocaleString()} diamonds.`
            );
        }

        // ============================================================
        // SHOW CONFIRM POPUP
        // ============================================================
        function showConfirmPopup(title, message) {
            document.getElementById('confirmMessage').textContent = message;
            document.querySelector('#confirmPopup h2').textContent = title;
            document.getElementById('confirmPopup').classList.add('active');
        }

        // ============================================================
        // CLOSE CONFIRM POPUP
        // ============================================================
        function closeConfirmPopup() {
            document.getElementById('confirmPopup').classList.remove('active');
            pendingAction = null;
            pendingAmount = 0;
        }

        // ============================================================
        // CONFIRM ACTION
        // ============================================================
        async function confirmAction() {
            closeConfirmPopup();

            if (!selectedUserId || !pendingAction) return;

            try {
                const userRef = db.collection('users').doc(selectedUserId);
                let updateData = {};

                if (pendingAction === 'add') {
                    // Add to totalDiamonds (main balance)
                    updateData.totalDiamonds = firebase.firestore.FieldValue.increment(pendingAmount);
                    showToast(`✅ ${pendingAmount.toLocaleString()} diamonds added!`, 'success');
                } else if (pendingAction === 'remove') {
                    // Remove from totalDiamonds first, then referral, then team
                    let remaining = pendingAmount;
                    let mainBalance = selectedUserData.totalDiamonds || 0;
                    let referralBonus = selectedUserData.referralBonus || 0;
                    let teamEarning = selectedUserData.teamEarning || 0;

                    // Remove from main balance first
                    if (remaining > 0 && mainBalance > 0) {
                        const deduct = Math.min(remaining, mainBalance);
                        mainBalance -= deduct;
                        remaining -= deduct;
                    }
                    // Then from referral bonus
                    if (remaining > 0 && referralBonus > 0) {
                        const deduct = Math.min(remaining, referralBonus);
                        referralBonus -= deduct;
                        remaining -= deduct;
                    }
                    // Then from team earning
                    if (remaining > 0 && teamEarning > 0) {
                        const deduct = Math.min(remaining, teamEarning);
                        teamEarning -= deduct;
                        remaining -= deduct;
                    }

                    updateData.totalDiamonds = mainBalance;
                    updateData.referralBonus = referralBonus;
                    updateData.teamEarning = teamEarning;
                    
                    // Log removal
                    await db.collection('adminActions').add({
                        userId: selectedUserId,
                        userEmail: selectedUserData.email || 'Unknown',
                        action: 'remove',
                        amount: pendingAmount,
                        createdAt: new Date().toISOString(),
                        adminEmail: auth.currentUser?.email || 'Unknown'
                    });

                    showToast(`✅ ${pendingAmount.toLocaleString()} diamonds removed!`, 'success');
                } else if (pendingAction === 'set') {
                    // Set custom balance (distribute across all three)
                    const currentTotal = (selectedUserData.totalDiamonds || 0) + 
                                       (selectedUserData.referralBonus || 0) + 
                                       (selectedUserData.teamEarning || 0);
                    
                    if (pendingAmount > currentTotal) {
                        // Add extra to main balance
                        const diff = pendingAmount - currentTotal;
                        updateData.totalDiamonds = firebase.firestore.FieldValue.increment(diff);
                    } else if (pendingAmount < currentTotal) {
                        // Remove from main balance first
                        const diff = currentTotal - pendingAmount;
                        let mainBalance = selectedUserData.totalDiamonds || 0;
                        let newMain = Math.max(0, mainBalance - diff);
                        updateData.totalDiamonds = newMain;
                    }
                    
                    showToast(`✅ Balance set to ${pendingAmount.toLocaleString()} diamonds!`, 'success');
                }

                if (Object.keys(updateData).length > 0) {
                    await userRef.update(updateData);
                }

                // Reload data
                setTimeout(() => {
                    loadAllUsers();
                    closeDiamondPopup();
                }, 500);

            } catch (error) {
                console.error('Action error:', error);
                showToast(`❌ Error: ${error.message}`, 'error');
            }

            pendingAction = null;
            pendingAmount = 0;
        }

        // ============================================================
        // SHOW TOAST
        // ============================================================
        function showToast(message, type = 'info') {
            const colors = {
                success: '#4CAF50',
                error: '#ff4444',
                warning: '#FFD700',
                info: '#4285F4'
            };

            const toast = document.createElement('div');
            toast.style.cssText = `
                    position: fixed;
                    bottom: 80px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: rgba(20,20,18,0.95);
                    color: #fff;
                    padding: 14px 24px;
                    border-radius: 12px;
                    border-left: 4px solid ${colors[type] || colors.info};
                    z-index: 999999;
                    font-family: 'Montserrat', sans-serif;
                    font-size: 0.9rem;
                    max-width: 90%;
                    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
                    animation: fadeIn 0.3s ease;
                `;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s ease';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // ============================================================
        // HEADER SIGN IN
        // ============================================================
        const headerSignInBtn = document.getElementById('headerSignInBtn');
        headerSignInBtn.addEventListener('click', function() {
            if (auth.currentUser) {
                auth.signOut().then(() => {
                    showToast('Signed out successfully', 'success');
                });
            } else {
                showLoginPopup();
            }
        });

        // ============================================================
        // INITIAL LOAD
        // ============================================================
        console.log('✅ Admin Panel loaded successfully!');
        console.log('📌 Admin email: learnwithhusnain0@gmail.com');
    </script>
